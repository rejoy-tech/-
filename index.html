<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>동물의 숲 프로젝트 마을</title>
    <style>
        /* --- 1. 폰트 및 공통 설정 --- */
        @import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');
        
        :root {
            --theme-color: #a2d5c6; 
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Jua', sans-serif;
            background-color: #e0f2e9; 
            overflow: hidden;
            color: #6d5445;
        }

        .hidden { display: none !important; }

        /* --- 2. 인트로 화면 --- */
        #intro-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #f4f1ea;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 9999;
            transition: opacity 1s ease-out;
        }

        .intro-text-box {
            background-color: #fff; padding: 40px 60px; border-radius: 40px;
            border: 4px dashed #d4c4b7;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08); text-align: center;
            animation: float 3s ease-in-out infinite;
        }

        .loading-text { font-size: 2.2rem; color: #558a74; margin-bottom: 5px; }
        .loading-text-en { font-size: 1.2rem; color: #928377; margin-bottom: 25px;}
        
        .progress-bar-container { 
            width: 600px; height: 15px; 
            background-color: #e8f4f1; border-radius: 15px; 
            overflow: hidden; border: 2px solid #a2d5c6;
            margin: 0 auto;
        }
        .progress-bar { 
            width: 0%; height: 100%; 
            background-color: #a2d5c6; 
            transition: width 0.1s linear; 
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        /* --- 3. 메인 지도 화면 --- */
        #map-screen {
            position: relative; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, #83c497 10%, transparent 20%),
                radial-gradient(circle at 80% 70%, #83c497 15%, transparent 30%),
                radial-gradient(circle at 50% 50%, #a4e0b7 40%, transparent 60%);
            background-color: #92d3a6;
            background-size: cover; background-position: center;
        }

        .map-title {
            position: absolute; top: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 12px 35px; border-radius: 30px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
            z-index: 10; font-size: 1.6rem; color: #558a74;
            border: 3px solid #d4c4b7;
        }

        /* 지도 위 구역 (집 + 캐릭터 + 대사 묶음) */
        .map-plot {
            position: absolute; display: flex; flex-direction: column; align-items: center;
            cursor: pointer; transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 5;
        }
        .map-plot:hover { transform: scale(1.1) translateY(-10px); z-index: 20; }

        /* 지도용 말풍선 */
        .map-bubble {
            position: absolute; top: -75px;
            background-color: #ffcf70; color: #6d5445;
            padding: 8px 15px; border-radius: 15px;
            font-size: 1rem; font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            white-space: nowrap; opacity: 0;
            transform: scale(0);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 30; pointer-events: none;
            border: 2px solid #e6ba65;
        }
        .map-bubble::after {
            content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%);
            border-width: 8px 8px 0; border-style: solid;
            border-color: #ffcf70 transparent transparent transparent;
        }
        .map-plot:hover .map-bubble {
            opacity: 1; transform: scale(1);
        }

        .house {
            position: relative; width: 70px; height: 50px;
            background-color: #fffaeb; border: 4px solid #8c7662; border-radius: 10px;
            margin-bottom: -15px;
            display: flex; justify-content: center; align-items: flex-end;
            box-shadow: 0 8px 0 rgba(0,0,0,0.08); z-index: 1;
        }
        .house-roof {
            position: absolute; top: -24px; width: 86px; height: 35px;
            background-color: var(--house-color, #a2d5c6);
            border: 4px solid #8c7662; border-radius: 20px 20px 8px 8px;
        }
        .house-chimney {
            position: absolute; top: -35px; right: 8px; width: 14px; height: 20px;
            background-color: #d4c4b7; border: 4px solid #8c7662; border-radius: 4px; z-index: -1;
        }
        .house-door {
            width: 20px; height: 26px; background-color: #c4a482;
            border: 4px solid #8c7662; border-bottom: none; border-radius: 10px 10px 0 0;
        }

        .map-pin { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; }
        .map-pin img {
            width: 60px; height: 60px; object-fit: cover;
            border-radius: 50%; border: 4px solid var(--house-color, #fff); background-color: #fff;
            box-shadow: 0 6px 15px rgba(0,0,0,0.2);
        }
        .map-pin::after {
            content: ''; display: block; width: 35px; height: 8px;
            background-color: rgba(0,0,0,0.15); border-radius: 50%; margin-top: -4px; z-index: -1;
        }

        #hover-tooltip {
            position: absolute; display: none;
            background-color: rgba(255, 255, 255, 0.9); padding: 5px 12px; border-radius: 12px;
            color: #6d5445; box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            z-index: 200; pointer-events: none; font-size: 0.9rem;
            border: 2px solid #d4c4b7;
        }

        /* --- 4. 상세 화면 (모달 배경) --- */
        #detail-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(244, 241, 234, 0.95);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000; overflow-y: auto; padding: 20px;
            box-sizing: border-box;
            transition: background 0.4s ease-in-out; 
        }

        .detail-card {
            background-color: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(5px); 
            -webkit-backdrop-filter: blur(5px);
            width: 100%; max-width: 500px;
            padding: 40px 30px; border-radius: 40px;
            border: 4px dashed var(--theme-color);
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            text-align: center; position: relative;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .character-area { position: relative; display: inline-block; margin: 20px 0; }
        .cute-img {
            width: 160px; height: 160px; object-fit: cover;
            border-radius: 50%; border: 8px solid var(--theme-color);
            cursor: pointer; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background-color: #e8f4f1;
        }
        .cute-img:hover { transform: scale(1.05); }

        .speech-bubble {
            position: absolute; top: -50px; left: 50%;
            transform: translateX(-50%) scale(0);
            background-color: var(--theme-color); color: #ffffff;
            padding: 12px 24px; border-radius: 25px; font-size: 1.2rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15); pointer-events: none; white-space: nowrap; z-index: 10;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .speech-bubble::after {
            content: ''; position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%);
            border-width: 10px 10px 0; border-style: solid;
            border-color: var(--theme-color) transparent transparent transparent;
        }
        .speech-bubble.show { transform: translateX(-50%) scale(1); }

        .info-box {
            background-color: rgba(250, 248, 245, 0.8); 
            padding: 20px; border-radius: 20px;
            margin-top: 10px; margin-bottom: 25px; text-align: left;
            border-left: 8px solid var(--theme-color);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .info-box h2 { margin: 0 0 10px 0; color: var(--theme-color); font-size: 1.5rem; }
        .info-box p { color: #887a6f; line-height: 1.6; margin-bottom: 15px; font-size: 1.1rem; }
        
        .task-list { list-style: none; padding: 0; margin: 0; }
        .task-list li { margin-bottom: 8px; font-size: 1.05rem; color: #6d5445; }
        .task-list li::before { content: "🍃"; margin-right: 8px; font-size: 1.1rem; }

        .action-btn {
            background-color: #558a74; border: none; padding: 15px 30px;
            font-family: 'Jua', sans-serif; font-size: 1.4rem; color: white;
            border-radius: 30px; cursor: pointer; box-shadow: 0 6px 0 #3a6352;
            transition: all 0.1s; width: 100%;
        }
        .action-btn:active { transform: translateY(6px); box-shadow: 0 0 0 #3a6352; }
        
        /* 돌아가기 버튼 전용 색상 */
        .return-btn {
            background-color: #d4c4b7;
            box-shadow: 0 6px 0 #bcaea2;
        }
        .return-btn:active {
            box-shadow: 0 0 0 #bcaea2;
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <!-- ========================================== -->
    <!-- 🎵 [수정칸 1] BGM 음악 파일 설정            -->
    <!-- src 안에 구하신 배경음악 파일 이름(.mp3)을 넣으세요 -->
    <!-- ========================================== -->
    <audio id="bgm-audio" loop>
        <source src="bgm\🏝모동숲 오프닝 브금 1hour.m4a" type="audio/mpeg">
    </audio>

    <div id="intro-screen">
        <div class="intro-text-box">
            <div class="loading-text">Nook Inc. 패키지 투어 안내데스크 🍃</div>
            <div class="loading-text-en">Welcome to Bamegong Forest</div>
            
            <!-- ⭐ 시작(탑승) 버튼 추가 -->
            <button class="action-btn" id="startBtn" style="margin-top: 30px; width: 80%;">비행기 탑승하기 ✈️</button>

            <!-- 탑승 버튼을 누르면 이 로딩 영역이 나타납니다 -->
            <div id="loading-area" class="hidden" style="margin-top: 30px;">
                <div class="loading-text-en" style="margin-bottom: 10px;">바메공 숲으로 이동 중...</div>
                <div class="progress-bar-container">
                    <div class="progress-bar" id="progress-bar"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="map-screen" class="hidden">
        <div class="map-title">🏕️ 모여봐요 바메공 숲</div>
        <div id="map-container"></div>
        <div id="hover-tooltip"></div>
    </div>

    <div id="detail-screen" class="hidden">
        <div class="detail-card">
            <div class="character-area">
                <div id="speechBubble" class="speech-bubble">안녕!</div>
                <img src="" alt="주민 사진" class="cute-img" id="characterImg">
            </div>
            <div class="info-box">
                <h2 id="modal-title">과제 주제</h2>
                <p id="modal-desc">설명</p>
                <ul class="task-list" id="modal-tasks"></ul>
            </div>
            <button class="action-btn return-btn" id="closeBtn">✈️ 마을 지도로 돌아가기</button>
        </div>
    </div>

    <script>
        // ==========================================
        // 📝 [수정칸 2] 팀원 데이터 설정
        // ==========================================
        const teamMembers = [
            { 
                id: 'user1', name: '박서연', 
                img: 'image_4.png', 
                bgUrl: 'be/박서연.jpg', // 예: 'bg_seoyeon.jpg'
                bubble: '아 왜 눌러요', color: '#a2d5c6',
                pos: { top: '22%', left: '18%' },
                modalTitle: '박서연',
                modalDesc: '하하 안녕하세요 박서연이라고 합니다',
                modalTasks: ['istp', '누워 있는거 짱 좋아함', '아이돌, 애니 주제로 얘기 걸어주면 입에 모터 달고 말할 수도..!']
            },
            { 
                id: 'user4', name: '조용화', 
                img: 'image_3.png', 
                bgUrl: 'be/jo.jpg', // 예: 'bg_yonghwa.jpg'
                bubble: '저 아세요?', color: '#558a74',
                pos: { top: '22%', left: '72%' },
                modalTitle: '조용화',
                modalDesc: '오늘도 마을을 위해 열심히 일해야지',
                modalTasks: ['조용화는 조용한게 좋아요', '공부 좋아함?', '탁구 엄청 좋아해요']
            },
            { 
                id: 'user2', name: '김동욱', 
                img: 'image_2.png', 
                bgUrl: 'be/dong.jpg', // 예: 'bg_dongwook.jpg'
                bubble: '무슨 말을 할까나', color: '#ffcf70',
                pos: { top: '48%', left: '45%' },
                modalTitle: '김동욱',
                modalDesc: '럭비공같이 통통튀는 매력을 지닌 외유내강의 남자',
                modalTasks: ['취미: 농구, 배구', '특징: 키:187.5', '별명: 모아이, 똥식이']
            },
            { 
                id: 'user5', name: '권태윤', 
                img: 'image_1.png', 
                bgUrl: 'be/권태윤.png', // 예: 'bg_taeyoon.jpg'
                bubble: '안녕하세요 권태윤이에요 다음에 마을 사람들과 모여 같이 소통해봐요!', color: '#ffb7b2',
                pos: { top: '72%', left: '22%' },
                modalTitle: '권태윤',
                modalDesc: '바메공 마을의 초급 기획자',
                modalTasks: ['기가 잘 빨려요', '광대에요', '낭만있어요']
            },
            { 
                id: 'user3', name: '손아림', 
                img: 'image_0.png', 
                bgUrl: 'be/so.jpg', // 예: 'bg_arim.jpg'
                bubble: '야구 무슨 팀 좋아해요?', color: '#d4c4b7',
                pos: { top: '72%', left: '70%' },
                modalTitle: '손아림',
                modalDesc: '손아림이라고 해요 반가워요',
                modalTasks: ['야구 젛아함', '먹짱', '귀차니즘 만렙']
            }
        ];
        
        const introScreen = document.getElementById('intro-screen');
        const startBtn = document.getElementById('startBtn');
        const loadingArea = document.getElementById('loading-area');
        const progressBar = document.getElementById('progress-bar');
        const mapScreen = document.getElementById('map-screen');
        const mapContainer = document.getElementById('map-container');
        const detailScreen = document.getElementById('detail-screen'); 
        const tooltip = document.getElementById('hover-tooltip');
        const bgmAudio = document.getElementById('bgm-audio'); 
        
        // --- 1. 탑승 버튼 클릭 시 BGM 재생 및 로딩 시작 ---
        startBtn.addEventListener('click', () => {
            // 버튼 숨기고 로딩바 표시
            startBtn.style.display = 'none';
            loadingArea.classList.remove('hidden');

            // 🎵 사용자 상호작용(클릭) 이벤트 안에서 오디오 재생하므로 브라우저 차단 우회 성공!
            bgmAudio.volume = 0.5;
            bgmAudio.play().catch(error => {
                console.log("BGM 재생 오류:", error);
            });

            // 로딩 바 애니메이션 시작
            let width = 0;
            const loadingInterval = setInterval(() => {
                width += 2; 
                progressBar.style.width = width + '%';
                if (width >= 100) {
                    clearInterval(loadingInterval);
                    setTimeout(() => {
                        introScreen.style.opacity = '0';
                        setTimeout(() => {
                            introScreen.classList.add('hidden');
                            mapScreen.classList.remove('hidden');
                            renderMap();
                        }, 1000);
                    }, 500);
                }
            }, 30);
        });

        // --- 2. 마을 지도 렌더링 ---
        function renderMap() {
            mapContainer.innerHTML = '';
            teamMembers.forEach(member => {
                const plot = document.createElement('div');
                plot.className = 'map-plot';
                plot.style.top = member.pos.top;
                plot.style.left = member.pos.left;
                plot.style.setProperty('--house-color', member.color);
                
                const bubble = document.createElement('div');
                bubble.className = 'map-bubble';
                bubble.innerText = member.name + '의 집'; 
                plot.appendChild(bubble);

                const house = document.createElement('div');
                house.className = 'house';
                house.innerHTML = '<div class="house-chimney"></div><div class="house-roof"></div><div class="house-door"></div>';
                plot.appendChild(house);

                const pin = document.createElement('div');
                pin.className = 'map-pin';
                const img = document.createElement('img');
                img.src = member.img;
                pin.appendChild(img);
                plot.appendChild(pin);
                
                plot.addEventListener('click', () => openDetailView(member));
                
                plot.addEventListener('mousemove', (e) => {
                    tooltip.innerText = `${member.name} (클릭하여 방문)`;
                    tooltip.style.display = 'block';
                    tooltip.style.left = (e.pageX + 15) + 'px';
                    tooltip.style.top = (e.pageY + 15) + 'px';
                });
                plot.addEventListener('mouseleave', () => tooltip.style.display = 'none');

                mapContainer.appendChild(plot);
            });
        }

        // --- 3. 개인 프로필 모달 ---
        let bubbleTimer;
        function openDetailView(member) {
            mapScreen.classList.add('hidden');
            detailScreen.classList.remove('hidden');
            document.documentElement.style.setProperty('--theme-color', member.color);
            
            if(member.bgUrl && member.bgUrl.trim() !== '') {
                detailScreen.style.background = `url('${member.bgUrl}')`;
                detailScreen.style.backgroundSize = 'cover';
                detailScreen.style.backgroundPosition = 'center';
            } else {
                detailScreen.style.background = 'rgba(244, 241, 234, 0.95)';
            }

            document.getElementById('characterImg').src = member.img;
            document.getElementById('speechBubble').innerText = member.bubble;
            document.getElementById('modal-title').innerText = member.modalTitle;
            document.getElementById('modal-desc').innerText = member.modalDesc;
            
            const tasksList = document.getElementById('modal-tasks');
            tasksList.innerHTML = ''; 
            member.modalTasks.forEach(task => {
                const li = document.createElement('li');
                li.innerText = task;
                tasksList.appendChild(li);
            });
            document.getElementById('speechBubble').classList.remove('show');
        }

        document.getElementById('closeBtn').addEventListener('click', () => {
            detailScreen.classList.add('hidden');
            mapScreen.classList.remove('hidden');
        });

        const charImg = document.getElementById('characterImg');
        const detailBubble = document.getElementById('speechBubble');
        charImg.addEventListener('click', function() {
            const angle = Math.floor(Math.random() * 30) - 15;
            charImg.style.transform = `rotate(${angle}deg) scale(0.95)`;
            setTimeout(() => { charImg.style.transform = 'rotate(0deg) scale(1.05)'; }, 200);
            detailBubble.classList.add('show');
            clearTimeout(bubbleTimer);
            bubbleTimer = setTimeout(() => { detailBubble.classList.remove('show'); }, 2500);
        });
    </script>
</body>
</html>
