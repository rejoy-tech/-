<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>바메공 숲 - 여행 다이어리</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap');
        
        :root {
            --ac-green: #78c8a6;
            --ac-cream: #fdf8e7;
            --ac-brown: #7b6255;
            --ac-yellow: #f1db75;
            --phone-frame: #1a1a1a;
            --phone-bg: #e0f2e9;
            --loading-bg: #f4f1ea; /* ⭐️ 동숲 특유의 따뜻한 로딩 배경색 */
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Jua', sans-serif;
            background-color: #2c3e50; 
            background: url('https://www.transparenttextures.com/patterns/wood-pattern.png'), radial-gradient(circle at center, #5b7994, #2c3e50);
            overflow: hidden; color: var(--ac-brown); user-select: none;
            display: flex; justify-content: center; align-items: center;
        }

        /* --- 스마트폰 외형 --- */
        .smartphone-container {
            width: 380px; height: 780px;
            background-color: var(--phone-frame);
            border-radius: 50px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6), inset 0 0 0 4px #555;
            position: relative;
            transition: all 0.8s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .smartphone-container.zoomed { transform: scale(1.6); filter: blur(8px); opacity: 0; pointer-events: none; }

        .notch {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            width: 100px; height: 28px; background-color: var(--phone-frame);
            border-radius: 20px; z-index: 200;
        }

        .screen-content {
            width: 350px; height: 750px; margin: 15px;
            background-color: var(--phone-bg);
            border-radius: 35px; overflow: hidden; position: relative;
        }

        .status-bar {
            position: absolute; top: 0; left: 0; width: 100%; height: 45px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 30px; box-sizing: border-box;
            font-family: 'Noto Sans KR', sans-serif; font-size: 0.85rem; font-weight: bold;
            color: #555; z-index: 150; pointer-events: none;
        }

        /* ⭐️ 볼륨 HUD */
        .volume-hud {
            position: absolute; top: -50px; left: 50%; transform: translateX(-50%);
            width: 150px; height: 30px; background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px); border-radius: 15px;
            display: flex; align-items: center; padding: 0 15px; gap: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000; font-family: 'Noto Sans KR'; font-size: 0.8rem; font-weight: bold; color: #555;
        }
        .volume-hud.show { top: 40px; } 
        .v-bar { flex-grow: 1; height: 6px; background: #ddd; border-radius: 3px; overflow: hidden; }
        .v-fill { height: 100%; width: 50%; background: var(--ac-green); transition: width 0.1s; }

        /* --- 홈 화면 --- */
        #view-home {
            width: 100%; height: 100%; position: absolute; top: 0; left: 0;
            background: linear-gradient(to bottom, #a1c4fd, #c2e9fb); 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.6s; z-index: 50;
        }
        #view-home.fade-out { opacity: 0; pointer-events: none; }

        .app-icon-wrapper { display: flex; flex-direction: column; align-items: center; gap: 12px; cursor: pointer; }
        .app-icon { width: 80px; height: 80px; background: #fff; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.15); display: flex; justify-content: center; align-items: center; font-size: 3rem; }
        .app-name { color: #fff; font-size: 0.9rem; font-weight: bold; text-shadow: 0 1px 3px rgba(0,0,0,0.3); }

        /* --- ⭐️ 로딩 화면 (배경색 픽스) --- */
        #view-loading {
            width: 100%; height: 100%; position: absolute; top: 0; left: 0;
            background-color: var(--loading-bg); /* 검은색에서 베이지색으로 변경 */
            z-index: 200; /* 모든 화면 최상단 */
            display: flex; justify-content: center; align-items: center;
            padding: 5px; opacity: 0; visibility: hidden; 
            transition: opacity 0.3s ease-in-out; pointer-events: none;
        }
        #view-loading.active { opacity: 1; visibility: visible; pointer-events: auto; }
        
        /* 🌴 야자수 로딩 아이콘 */
        .loading-icon {
            font-size: 3rem; /* 크기 확대 */
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.1));
            animation: bounce 0.8s infinite alternate cubic-bezier(0.45, 0.05, 0.55, 0.95);
        }
        @keyframes bounce {
            0% { transform: translateY(0) rotate(-5deg); }
            100% { transform: translateY(-20px) rotate(5deg); }
        }

        /* --- 맵 화면 --- */
        #view-map {
            width: 100%; height: 100%; position: absolute; top: 0; left: 0;
            background: url('be/sm.jpg') center/cover no-repeat;
            background-color: #72cc9b; 
            opacity: 0; z-index: 40;
        }
        #view-map.active { opacity: 1; }

        .map-pin { position: absolute; display: flex; flex-direction: column; align-items: center; cursor: pointer; transform: translate(-50%, -100%); transition: transform 0.3s; }
        .map-pin:hover { transform: translate(-50%, -100%) scale(1.1); }
        .pin-photo { width: 65px; height: 65px; object-fit: contain; filter: drop-shadow(0 5px 6px rgba(0,0,0,0.3)); }
        .pin-name { background: rgba(123, 98, 85, 0.9); color: #fff; font-size: 0.8rem; padding: 2px 8px; border-radius: 12px; margin-top: 2px; }

        /* --- 다이어리 & 엔딩 (이전과 동일) --- */
        #diary-portal, #ending-portal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); opacity: 0; visibility: hidden; z-index: 2000; transition: all 0.6s cubic-bezier(0.19, 1, 0.22, 1); }
        #diary-portal.active, #ending-portal.active { opacity: 1; visibility: visible; }

        .scrapbook, .ending-scrapbook { width: 90%; max-width: 900px; height: 80vh; max-height: 600px; background-color: #fff; border-radius: 30px; box-shadow: 0 40px 100px rgba(0,0,0,0.5); display: flex; overflow: hidden; transform: scale(0.8) translateY(50px); transition: all 0.6s cubic-bezier(0.19, 1, 0.22, 1); position: relative; }
        #diary-portal.active .scrapbook, #ending-portal.active .ending-scrapbook { transform: scale(1) translateY(0); }
        
        .book-left { width: 45%; background-color: #f4f1ea; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 30px; border-right: 2px dashed #ccc; box-sizing: border-box; position: relative; }
        .photo-frame { width: 100%; aspect-ratio: 4/5; background: #fff; padding: 12px 12px 50px 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); transform: rotate(-3deg); }
        .photo-frame img { width: 100%; height: 100%; object-fit: cover; }
        .char-badge { position: absolute; bottom: 40px; right: 10px; width: 130px; height: 130px; border-radius: 50%; border: 8px solid #fff; box-shadow: 0 10px 20px rgba(0,0,0,0.2); object-fit: cover; transform: rotate(5deg); background: var(--ac-light-green); }

        .book-right { width: 55%; padding: 50px; display: flex; flex-direction: column; background-image: linear-gradient(#e5e5e5 1px, transparent 1px); background-size: 100% 2.5em; background-color: #fff; box-sizing: border-box; }
        .d-title { font-size: 2.2rem; color: var(--ac-green); margin-bottom: 15px; }
        .d-desc { font-family: 'Noto Sans KR'; font-size: 1.1rem; line-height: 2.27; color: #444; flex-grow: 1; }
        .close-diary { position: absolute; top: 20px; right: 20px; background: #ff9494; color: #fff; border: 4px solid #fff; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; font-size: 1.5rem; display: flex; justify-content: center; align-items: center; }

        .ending-scrapbook { flex-direction: column; padding: 40px; text-align: center; max-width: 700px; height: auto; }
        .group-photo { width: 100%; max-height: 350px; object-fit: cover; border-radius: 20px; border: 8px solid #fff; box-shadow: 0 10px 20px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .btn-end { padding: 12px 30px; border-radius: 30px; font-family: 'Jua'; font-size: 1.2rem; cursor: pointer; border: 4px solid var(--ac-brown); margin: 0 10px; }
    </style>
</head>
<body>

    <audio id="bgm-audio" loop><source src="bgm\🏝모동숲 오프닝 브금 1hour.m4a" type="audio/mpeg"></audio>

    <div class="smartphone-container" id="phone">
        <div class="notch"></div>
        <div class="screen-content">
            <div class="volume-hud" id="volume-hud">
                <span>🔈</span>
                <div class="v-bar"><div class="v-fill" id="v-fill"></div></div>
            </div>

            <div class="status-bar">
                <span id="clock">12:00</span>
                <span>5G 🔋 100%</span>
            </div>

            <div id="view-home">
                <div class="app-icon-wrapper" id="openAppBtn">
                    <div class="app-icon">🍃</div>
                    <p class="app-name">바메공 일기</p>
                </div>
            </div>

            <div id="view-loading">
                <div class="loading-icon">🌴</div>
            </div>

            <div id="view-map"></div>
        </div>
    </div>

    <div id="diary-portal">
        <div class="scrapbook">
            <div class="close-diary" id="closeBtn">✖</div>
            <div class="book-left">
                <div class="photo-frame"><img src="" id="d-bg-img"></div>
                <img src="" class="char-badge" id="d-char-img">
            </div>
            <div class="book-right">
                <div class="d-title" id="d-name"></div>
                <div class="d-desc" id="d-desc"></div>
                <div id="d-greeting" style="margin-top: auto; font-style: italic; color: #888;"></div>
            </div>
        </div>
    </div>

    <div id="ending-portal">
        <div class="ending-scrapbook">
            <h2 style="font-size: 2rem; color: var(--ac-green);">바메공 숲 여행 완료! 🎉</h2>
            <img src="gr.png" class="group-photo">
            <p style="font-family: 'Noto Sans KR'; color: #666; margin-bottom: 20px;">모든 주민을 만났습니다. 즐거운 여행이었나요?</p>
            <div>
                <button class="btn-end" id="btn-close-app" style="background: #ff9494; color: #fff;">앱 종료</button>
                <button class="btn-end" id="btn-reminisce" style="background: var(--ac-yellow);">다시 보기</button>
            </div>
        </div>
    </div>

    <script>
        const teamMembers = [
            { id: 'u1', name: '박서연', img: 'ch/image_4.png', bgUrl: 'be/박서연.jpg', color: '#78c8a6', pos: { top: '35%', left: '25%' }, desc: '조용한 숲속에서 낮잠 자는 것을 가장 좋아하는 주민입니다. 혼자만의 시간이 필요하지만 아이돌 이야기엔 진심이에요!', greeting: '"하하 안녕하세요 박서연입니다. 아이돌 얘기 환영!"' },
            { id: 'u2', name: '조용화', img: 'ch/image_3.png', bgUrl: 'be/jo.jpg', color: '#558a74', pos: { top: '48%', left: '78%' }, desc: '바메공 숲의 기둥! 묵묵히 주민들을 도우며, 주말에는 탁구 한 판의 여유를 즐깁니다.', greeting: '"오늘도 마을을 위해 열심히! 탁구 좋아하세요?"' },
            { id: 'u3', name: '김동욱', img: 'ch/image_2.png', bgUrl: 'be/dong.jpg', color: '#ffcf70', pos: { top: '50%', left: '15%' }, desc: '187.5cm의 큰 키를 가진 활동파 주민! 시원시원한 성격으로 모두와 잘 어울리는 모아이입니다.', greeting: '"통통튀는 매력남 김동욱입니다! 운동 같이 해요!"' },
            { id: 'u4', name: '권태윤', img: 'ch/image_1.png', bgUrl: 'be/권태윤.png', color: '#ffb7b2', pos: { top: '62%', left: '85%' }, desc: '낭만을 쫓는 바메공 숲의 기획자! 에너지가 넘치고 소통하는 것을 정말 좋아하는 주민입니다.', greeting: '"안녕하세요 권태윤이에요! 낭만 가득한 하루 되세요!"' },
            { id: 'u5', name: '손아림', img: 'ch/image_0.png', bgUrl: 'be/so.jpg', color: '#c4a482', pos: { top: '96%', left: '44%' }, desc: '야구와 맛있는 음식이 인생의 전부! 느긋한 성격이지만 야구 시즌엔 누구보다 뜨거워집니다.', greeting: '"손아림입니다! 오늘 야구 누가 이길까요?"' }
        ];

        const bgmAudio = document.getElementById('bgm-audio');
        let visitedMembers = new Set();

        // 1. 앱 열기 (로딩 픽스)
        document.getElementById('openAppBtn').addEventListener('click', () => {
            bgmAudio.volume = 0.5; bgmAudio.play();
            updateVolumeHUD();

            // 즉시 로딩 화면 띄우기
            const loadingView = document.getElementById('view-loading');
            loadingView.classList.add('active');

            setTimeout(() => {
                // 맵 데이터 렌더링
                const mapView = document.getElementById('view-map');
                mapView.innerHTML = ''; 
                teamMembers.forEach(member => {
                    const pin = document.createElement('div');
                    pin.className = 'map-pin';
                    pin.style.top = member.pos.top; pin.style.left = member.pos.left;
                    pin.innerHTML = `<img src="${member.img}" class="pin-photo"><div class="pin-name">${member.name}</div>`;
                    pin.onclick = () => openPortal(member);
                    mapView.appendChild(pin);
                });

                mapView.classList.add('active');
                document.getElementById('view-home').classList.add('fade-out');

                // 로딩 화면 제거
                setTimeout(() => {
                    loadingView.classList.remove('active');
                }, 400);

            }, 2500); 
        });

        function openPortal(member) {
            visitedMembers.add(member.id);
            document.getElementById('phone').classList.add('zoomed');
            document.getElementById('d-name').innerText = member.name + "의 일기";
            document.getElementById('d-bg-img').src = member.bgUrl;
            document.getElementById('d-char-img').src = member.img;
            document.getElementById('d-desc').innerText = member.desc;
            document.getElementById('d-greeting').innerText = member.greeting;
            setTimeout(() => document.getElementById('diary-portal').classList.add('active'), 300);
        }

        document.getElementById('closeBtn').onclick = () => {
            document.getElementById('diary-portal').classList.remove('active');
            document.getElementById('phone').classList.remove('zoomed');
            if (visitedMembers.size === teamMembers.length) {
                setTimeout(() => {
                    document.getElementById('phone').classList.add('zoomed');
                    document.getElementById('ending-portal').classList.add('active');
                }, 800);
            }
        };

        document.getElementById('btn-close-app').onclick = () => {
            location.reload(); // 가장 깔끔한 초기화
        };

        document.getElementById('btn-reminisce').onclick = () => {
            visitedMembers.clear();
            document.getElementById('ending-portal').classList.remove('active');
            document.getElementById('phone').classList.remove('zoomed');
        };

        // 볼륨 & 시계
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
        }, 1000);

        function updateVolumeHUD() {
            document.getElementById('v-fill').style.width = (bgmAudio.volume * 100) + '%';
            document.getElementById('volume-hud').classList.add('show');
            setTimeout(() => document.getElementById('volume-hud').classList.remove('show'), 1500);
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
                e.preventDefault();
                bgmAudio.volume = e.key === 'ArrowUp' ? Math.min(1, bgmAudio.volume + 0.1) : Math.max(0, bgmAudio.volume - 0.1);
                updateVolumeHUD();
            }
        });
    </script>
</body>
</html>
